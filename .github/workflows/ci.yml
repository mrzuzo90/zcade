name: CI

# Required-check pipeline for zCADe (Phase A, Gate G-A and onward).
# Runs on every push and PR; all four jobs must pass before merge to main.
# See CLAUDE.md and COMPLETE_PROJECT_ROADMAP.md Section 5 for the quality
# strategy this pipeline enforces, and Section 9.2 for the merge rules.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same branch/PR to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Pin the Node version used across all jobs; bump deliberately, not by drift.
  NODE_VERSION: '20'

jobs:
  type-check:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run type-check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run lint

  test:
    name: Unit & integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run test -- --reporter=verbose

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build

  # Single required status check to point branch protection at, so adding a
  # job above doesn't silently require a protection-rule update elsewhere.
  ci-gate:
    name: CI gate
    if: always()
    needs: [type-check, lint, test, build]
    runs-on: ubuntu-latest
    steps:
      - name: Fail if any required job failed
        run: |
          if [ "${{ contains(needs.*.result, 'failure') }}" = "true" ] || [ "${{ contains(needs.*.result, 'cancelled') }}" = "true" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
