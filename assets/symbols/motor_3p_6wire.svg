<svg viewBox="0 0 90 60" xmlns="http://www.w3.org/2000/svg">
  <!--
    6-wire (double-star) 3-phase motor. Circle body with terminals on BOTH
    the top (U1/V1/W1, line feed) and bottom (U2/V2/W2, winding ends) — the
    external jumpering between them is what selects Star (Y) vs Delta (Δ),
    see docs/component-catalog.md §5 and library.ts's motor_3p_6wire
    comment. No internal contacts/switching drawn (there are none).
  -->
  <g id="layer:base">
    <path d="M15,0 L15,8" stroke="currentColor" stroke-width="1.5"/>
    <path d="M30,0 L30,8" stroke="currentColor" stroke-width="1.5"/>
    <path d="M45,0 L45,8" stroke="currentColor" stroke-width="1.5"/>
    <path d="M15,60 L15,52" stroke="currentColor" stroke-width="1.5"/>
    <path d="M30,60 L30,52" stroke="currentColor" stroke-width="1.5"/>
    <path d="M45,60 L45,52" stroke="currentColor" stroke-width="1.5"/>
    <path d="M30,8 A22,22 0 1,0 30,52 A22,22 0 1,0 30,8 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="layer:energized">
    <path d="M30,8 A22,22 0 1,0 30,52 A22,22 0 1,0 30,8 Z" fill="#f59e0b" opacity="0.15"/>
  </g>
  <g id="pins">
    <circle data-pin-id="U1" data-pin-kind="power" cx="15" cy="0" r="1"/>
    <circle data-pin-id="V1" data-pin-kind="power" cx="30" cy="0" r="1"/>
    <circle data-pin-id="W1" data-pin-kind="power" cx="45" cy="0" r="1"/>
    <circle data-pin-id="U2" data-pin-kind="power" cx="15" cy="60" r="1"/>
    <circle data-pin-id="V2" data-pin-kind="power" cx="30" cy="60" r="1"/>
    <circle data-pin-id="W2" data-pin-kind="power" cx="45" cy="60" r="1"/>
  </g>
</svg>
