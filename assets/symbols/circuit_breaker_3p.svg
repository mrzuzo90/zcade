<svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg">
  <!--
    3-pole magnetothermal breaker — unifilar (single-line) style per the ADG
    sheet: per pole a switch blade with an automatic-trip "x" marker (replacing
    the previous diamond disconnect glyph — art-only swap, spec Decision #3).
    Pins/footprint unchanged (6 power terminals). A dashed vertical line ties
    the 3 poles together (ganged). No trip modeling yet, so "base" is the only
    visual state.
  -->
  <g id="layer:base">
    <path d="M0,10 L26,10" stroke="currentColor" stroke-width="1.5"/>
    <path d="M34,10 L60,10" stroke="currentColor" stroke-width="1.5"/>
    <path d="M26,10 L34,5" stroke="currentColor" stroke-width="1.5"/>
    <path d="M35,7 L39,11 M39,7 L35,11" stroke="currentColor" stroke-width="1"/>

    <path d="M0,20 L26,20" stroke="currentColor" stroke-width="1.5"/>
    <path d="M34,20 L60,20" stroke="currentColor" stroke-width="1.5"/>
    <path d="M26,20 L34,15" stroke="currentColor" stroke-width="1.5"/>
    <path d="M35,17 L39,21 M39,17 L35,21" stroke="currentColor" stroke-width="1"/>

    <path d="M0,30 L26,30" stroke="currentColor" stroke-width="1.5"/>
    <path d="M34,30 L60,30" stroke="currentColor" stroke-width="1.5"/>
    <path d="M26,30 L34,25" stroke="currentColor" stroke-width="1.5"/>
    <path d="M35,27 L39,31 M39,27 L35,31" stroke="currentColor" stroke-width="1"/>

    <path d="M30,5 L30,34" stroke="currentColor" stroke-width="1" stroke-dasharray="3,3"/>
  </g>
  <g id="pins">
    <circle data-pin-id="1" data-pin-kind="power" cx="0" cy="10" r="1"/>
    <circle data-pin-id="2" data-pin-kind="power" cx="60" cy="10" r="1"/>
    <circle data-pin-id="3" data-pin-kind="power" cx="0" cy="20" r="1"/>
    <circle data-pin-id="4" data-pin-kind="power" cx="60" cy="20" r="1"/>
    <circle data-pin-id="5" data-pin-kind="power" cx="0" cy="30" r="1"/>
    <circle data-pin-id="6" data-pin-kind="power" cx="60" cy="30" r="1"/>
  </g>
</svg>
