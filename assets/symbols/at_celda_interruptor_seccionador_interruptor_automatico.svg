<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- at_celda_interruptor_seccionador_interruptor_automatico: HV cell —
       switch-disconnector (IN→MID) in series with a circuit breaker (MID→OUT). -->
  <g id="layer:base">
    <path d="M2,2 L58,2 L58,58 L2,58 Z" stroke="currentColor" stroke-width="1.3" fill="none"/>
    <path d="M30,0 L30,8" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M30,8 L40,20" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M24,20 L36,20" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M30,20 L30,32" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M25,32 L35,32 L35,44 L25,44 Z" fill="currentColor"/>
    <path d="M30,44 L30,60" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="pins">
    <circle data-pin-id="IN" data-pin-kind="power" cx="30" cy="0" r="1"/>
    <circle data-pin-id="MID" data-pin-kind="power" cx="30" cy="30" r="1"/>
    <circle data-pin-id="OUT" data-pin-kind="power" cx="30" cy="60" r="1"/>
  </g>
</svg>
