<svg viewBox="0 0 40 20" xmlns="http://www.w3.org/2000/svg">
  <!--
    Auxiliary NC contact block — see aux_contact_block_no.svg for the shared
    design notes (cross-instance linkedTo, dashed "remotely driven" arc).
    Default-closed bridge like push_button_nc; opens when the linked coil
    energizes.
  -->
  <g id="layer:base">
    <path d="M0,10 L14,10" stroke="currentColor" stroke-width="1.5"/>
    <path d="M26,10 L40,10" stroke="currentColor" stroke-width="1.5"/>
    <path d="M14,7 L14,13" stroke="currentColor" stroke-width="1.5"/>
    <path d="M26,7 L26,13" stroke="currentColor" stroke-width="1.5"/>
    <path d="M16,4 A4,4 0 0,1 24,4" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2" fill="none"/>
  </g>
  <g id="layer:contact-21-22-open">
    <path d="M14,10 L26,3" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="layer:contact-21-22-closed">
    <path d="M14,10 L26,10" stroke="#22c55e" stroke-width="2.5" fill="none"/>
  </g>
  <g id="pins">
    <circle data-pin-id="21" data-pin-kind="auxiliary_nc" cx="0" cy="10" r="1"/>
    <circle data-pin-id="22" data-pin-kind="auxiliary_nc" cx="40" cy="10" r="1"/>
  </g>
  <metadata id="stateLayers">
    {
      "base": "base",
      "contacts": {
        "21-22": { "open": "contact-21-22-open", "closed": "contact-21-22-closed" }
      }
    }
  </metadata>
</svg>
