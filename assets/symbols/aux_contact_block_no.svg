<svg viewBox="0 0 40 20" xmlns="http://www.w3.org/2000/svg">
  <!--
    Auxiliary NO contact block — no coil pins of its own; this instance's
    `properties.linkedTo` (or ContactSegment.linkedTo default) names which
    OTHER instance's coil actually drives it (see types/circuit.ts
    ContactSegment.linkedTo doc, and CLAUDE.md's contract-freeze note). The
    small dashed arc above the gap is a purely cosmetic "remotely driven"
    marker, distinguishing this from a manually-actuated pushbutton contact.
  -->
  <g id="layer:base">
    <path d="M0,10 L14,10" stroke="currentColor" stroke-width="1.5"/>
    <path d="M26,10 L40,10" stroke="currentColor" stroke-width="1.5"/>
    <path d="M14,7 L14,13" stroke="currentColor" stroke-width="1.5"/>
    <path d="M26,7 L26,13" stroke="currentColor" stroke-width="1.5"/>
    <path d="M16,4 A4,4 0 0,1 24,4" stroke="currentColor" stroke-width="1" stroke-dasharray="2,2" fill="none"/>
  </g>
  <g id="layer:contact-13-14-open">
    <path d="M14,10 L26,3" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="layer:contact-13-14-closed">
    <path d="M14,10 L26,10" stroke="#22c55e" stroke-width="2.5" fill="none"/>
  </g>
  <g id="pins">
    <circle data-pin-id="13" data-pin-kind="auxiliary_no" cx="0" cy="10" r="1"/>
    <circle data-pin-id="14" data-pin-kind="auxiliary_no" cx="40" cy="10" r="1"/>
  </g>
  <metadata id="stateLayers">
    {
      "base": "base",
      "contacts": {
        "13-14": { "open": "contact-13-14-open", "closed": "contact-13-14-closed" }
      }
    }
  </metadata>
</svg>
