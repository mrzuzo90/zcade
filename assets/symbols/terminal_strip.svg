<svg viewBox="0 0 60 20" xmlns="http://www.w3.org/2000/svg">
  <!--
    4-terminal borne strip (docs/component-catalog.md §15, "X1, X2..."). Each
    terminal is a straight pass-through (top screw <-> bottom screw, same
    conductor, matching library.ts's `always_closed` contacts) — a small
    square terminal-block glyph over a single vertical lead per column.
  -->
  <g id="layer:base">
    <path d="M0,0 L0,20" stroke="currentColor" stroke-width="1.5"/>
    <path d="M20,0 L20,20" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,0 L40,20" stroke="currentColor" stroke-width="1.5"/>
    <path d="M60,0 L60,20" stroke="currentColor" stroke-width="1.5"/>
    <path d="M0,7 L8,7 L8,13 L0,13 Z" stroke="currentColor" stroke-width="1" fill="none"/>
    <path d="M16,7 L24,7 L24,13 L16,13 Z" stroke="currentColor" stroke-width="1" fill="none"/>
    <path d="M36,7 L44,7 L44,13 L36,13 Z" stroke="currentColor" stroke-width="1" fill="none"/>
    <path d="M52,7 L60,7 L60,13 L52,13 Z" stroke="currentColor" stroke-width="1" fill="none"/>
  </g>
  <g id="pins">
    <circle data-pin-id="1" data-pin-kind="power" cx="0" cy="0" r="1"/>
    <circle data-pin-id="1B" data-pin-kind="power" cx="0" cy="20" r="1"/>
    <circle data-pin-id="2" data-pin-kind="power" cx="20" cy="0" r="1"/>
    <circle data-pin-id="2B" data-pin-kind="power" cx="20" cy="20" r="1"/>
    <circle data-pin-id="3" data-pin-kind="power" cx="40" cy="0" r="1"/>
    <circle data-pin-id="3B" data-pin-kind="power" cx="40" cy="20" r="1"/>
    <circle data-pin-id="4" data-pin-kind="power" cx="60" cy="0" r="1"/>
    <circle data-pin-id="4B" data-pin-kind="power" cx="60" cy="20" r="1"/>
  </g>
</svg>
