<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- at_transformador_at_bt: HV/LV transformer — two coupled windings, isolated
       (galvanic separation, no series contact). -->
  <g id="layer:base">
    <path d="M30,0 L30,16" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M30,16 A9,9 0 1,0 30,34 A9,9 0 1,0 30,16 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M30,26 A9,9 0 1,0 30,44 A9,9 0 1,0 30,26 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M30,44 L30,60" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="pins">
    <circle data-pin-id="IN" data-pin-kind="power" cx="30" cy="0" r="1"/>
    <circle data-pin-id="OUT" data-pin-kind="power" cx="30" cy="60" r="1"/>
  </g>
</svg>
