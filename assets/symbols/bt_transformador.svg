<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- bt_transformador: two-winding transformer — isolated (galvanic isolation,
       no series contact), overlapping coil circles. -->
  <g id="layer:base">
    <path d="M20,0 L20,10" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M20,10 A7,7 0 1,0 20,24 A7,7 0 1,0 20,10 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M20,16 A7,7 0 1,0 20,30 A7,7 0 1,0 20,16 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M20,30 L20,40" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="pins">
    <circle data-pin-id="IN" data-pin-kind="power" cx="20" cy="0" r="1"/>
    <circle data-pin-id="OUT" data-pin-kind="power" cx="20" cy="40" r="1"/>
  </g>
</svg>
