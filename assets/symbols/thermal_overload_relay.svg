<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!--
    Thermal overload relay. 3 power poles (1-3-5 in / 2-4-6 out) as a
    breaker-style pass-through (diamond blade, always_closed — no overcurrent
    physics, matches circuit_breaker_3p) plus a small bimetal-strip glyph;
    below that, the two trip-driven auxiliary contacts (both `control:
    'tripped'`, opposite polarity — see library.ts's design note):
      - 95-96 (NC): default CLOSED (green bridge); trips OPEN, drawn in red
        since that's the "bad" event (breaks the seal-in/coil circuit).
      - 97-98 (NO): default OPEN (neutral currentColor diagonal); trips
        CLOSED, drawn in green like every other "closed = conducting" contact
        (this one is the intentional fault-lamp-driving contact).
    The differing open-state color (red vs neutral) is what keeps 95-96 and
    97-98 visually distinguishable at a glance, per the task requirement.
  -->
  <g id="layer:base">
    <path d="M0,10 L26,10" stroke="currentColor" stroke-width="1.5"/>
    <path d="M34,10 L60,10" stroke="currentColor" stroke-width="1.5"/>
    <path d="M30,6 L34,10 L30,14 L26,10 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>

    <path d="M0,20 L26,20" stroke="currentColor" stroke-width="1.5"/>
    <path d="M34,20 L60,20" stroke="currentColor" stroke-width="1.5"/>
    <path d="M30,16 L34,20 L30,24 L26,20 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>

    <path d="M0,30 L26,30" stroke="currentColor" stroke-width="1.5"/>
    <path d="M34,30 L60,30" stroke="currentColor" stroke-width="1.5"/>
    <path d="M30,26 L34,30 L30,34 L26,30 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>

    <path d="M50,7 L54,13 L50,19 L54,25 L50,31" stroke="currentColor" stroke-width="1" fill="none"/>

    <path d="M0,40 L20,40" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,40 L60,40" stroke="currentColor" stroke-width="1.5"/>
    <path d="M20,37 L20,43" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,37 L40,43" stroke="currentColor" stroke-width="1.5"/>

    <path d="M0,50 L20,50" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,50 L60,50" stroke="currentColor" stroke-width="1.5"/>
    <path d="M20,47 L20,53" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,47 L40,53" stroke="currentColor" stroke-width="1.5"/>
  </g>

  <g id="layer:contact-95-96-open">
    <path d="M20,40 L40,30" stroke="#dc2626" stroke-width="1.5" fill="none"/>
  </g>
  <g id="layer:contact-95-96-closed">
    <path d="M20,40 L40,40" stroke="#22c55e" stroke-width="2.5" fill="none"/>
  </g>

  <g id="layer:contact-97-98-open">
    <path d="M20,50 L40,40" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="layer:contact-97-98-closed">
    <path d="M20,50 L40,50" stroke="#22c55e" stroke-width="2.5" fill="none"/>
  </g>

  <g id="pins">
    <circle data-pin-id="1" data-pin-kind="power" cx="0" cy="10" r="1"/>
    <circle data-pin-id="2" data-pin-kind="power" cx="60" cy="10" r="1"/>
    <circle data-pin-id="3" data-pin-kind="power" cx="0" cy="20" r="1"/>
    <circle data-pin-id="4" data-pin-kind="power" cx="60" cy="20" r="1"/>
    <circle data-pin-id="5" data-pin-kind="power" cx="0" cy="30" r="1"/>
    <circle data-pin-id="6" data-pin-kind="power" cx="60" cy="30" r="1"/>
    <circle data-pin-id="95" data-pin-kind="auxiliary_nc" cx="0" cy="40" r="1"/>
    <circle data-pin-id="96" data-pin-kind="auxiliary_nc" cx="60" cy="40" r="1"/>
    <circle data-pin-id="97" data-pin-kind="auxiliary_no" cx="0" cy="50" r="1"/>
    <circle data-pin-id="98" data-pin-kind="auxiliary_no" cx="60" cy="50" r="1"/>
  </g>

  <metadata id="stateLayers">
    {
      "base": "base",
      "contacts": {
        "95-96": { "open": "contact-95-96-open", "closed": "contact-95-96-closed" },
        "97-98": { "open": "contact-97-98-open", "closed": "contact-97-98-closed" }
      }
    }
  </metadata>
</svg>
