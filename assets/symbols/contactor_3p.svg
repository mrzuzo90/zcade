<svg viewBox="0 0 60 80" xmlns="http://www.w3.org/2000/svg">
  <!--
    3-pole contactor. Coil drawn as a vertical box down the center column
    (A1 top-center, A2 bottom-center, matching library.ts offsets); 3 power
    poles break left/right of the coil at y=10/40/70, each with an open-blade
    (default) and closed-blade (bridged, highlighted) state layer swapped by
    ComponentSymbol.tsx from the segment's live closed/open state.
  -->
  <g id="layer:base">
    <path d="M24,4 L36,4 L36,76 L24,76 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M30,0 L30,4" stroke="currentColor" stroke-width="1.5"/>
    <path d="M30,76 L30,80" stroke="currentColor" stroke-width="1.5"/>

    <path d="M0,10 L20,10" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,10 L60,10" stroke="currentColor" stroke-width="1.5"/>
    <path d="M20,7 L20,13" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,7 L40,13" stroke="currentColor" stroke-width="1.5"/>

    <path d="M0,40 L20,40" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,40 L60,40" stroke="currentColor" stroke-width="1.5"/>
    <path d="M20,37 L20,43" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,37 L40,43" stroke="currentColor" stroke-width="1.5"/>

    <path d="M0,70 L20,70" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,70 L60,70" stroke="currentColor" stroke-width="1.5"/>
    <path d="M20,67 L20,73" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,67 L40,73" stroke="currentColor" stroke-width="1.5"/>
  </g>

  <g id="layer:energized">
    <path d="M24,4 L36,4 L36,76 L24,76 Z" fill="#f59e0b" opacity="0.3"/>
  </g>

  <g id="layer:contact-1-2-open">
    <path d="M20,10 L40,0" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="layer:contact-1-2-closed">
    <path d="M20,10 L40,10" stroke="#22c55e" stroke-width="2.5" fill="none"/>
  </g>

  <g id="layer:contact-3-4-open">
    <path d="M20,40 L40,30" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="layer:contact-3-4-closed">
    <path d="M20,40 L40,40" stroke="#22c55e" stroke-width="2.5" fill="none"/>
  </g>

  <g id="layer:contact-5-6-open">
    <path d="M20,70 L40,60" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="layer:contact-5-6-closed">
    <path d="M20,70 L40,70" stroke="#22c55e" stroke-width="2.5" fill="none"/>
  </g>

  <g id="pins">
    <circle data-pin-id="1" data-pin-kind="power_no" cx="0" cy="10" r="1"/>
    <circle data-pin-id="2" data-pin-kind="power_no" cx="60" cy="10" r="1"/>
    <circle data-pin-id="3" data-pin-kind="power_no" cx="0" cy="40" r="1"/>
    <circle data-pin-id="4" data-pin-kind="power_no" cx="60" cy="40" r="1"/>
    <circle data-pin-id="5" data-pin-kind="power_no" cx="0" cy="70" r="1"/>
    <circle data-pin-id="6" data-pin-kind="power_no" cx="60" cy="70" r="1"/>
    <circle data-pin-id="A1" data-pin-kind="coil" cx="30" cy="0" r="1"/>
    <circle data-pin-id="A2" data-pin-kind="coil" cx="30" cy="80" r="1"/>
  </g>

  <metadata id="stateLayers">
    {
      "base": "base",
      "energized": "energized",
      "contacts": {
        "1-2": { "open": "contact-1-2-open", "closed": "contact-1-2-closed" },
        "3-4": { "open": "contact-3-4-open", "closed": "contact-3-4-closed" },
        "5-6": { "open": "contact-5-6-open", "closed": "contact-5-6-closed" }
      }
    }
  </metadata>
</svg>
