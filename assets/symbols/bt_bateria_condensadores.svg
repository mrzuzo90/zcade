<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- bt_bateria_condensadores: capacitor bank — isolated (no series contact),
       two parallel plates. -->
  <g id="layer:base">
    <path d="M20,0 L20,17" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M8,17 L32,17 M8,23 L32,23" stroke="currentColor" stroke-width="1.8" fill="none"/>
    <path d="M20,23 L20,40" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="pins">
    <circle data-pin-id="IN" data-pin-kind="power" cx="20" cy="0" r="1"/>
    <circle data-pin-id="OUT" data-pin-kind="power" cx="20" cy="40" r="1"/>
  </g>
</svg>
