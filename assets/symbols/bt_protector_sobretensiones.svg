<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- bt_protector_sobretensiones: surge protective device (SPD/MOV). Isolated
       (archetype B): IN/OUT pins declared but NO bridging contact — it shunts
       transients to ground rather than conducting the feeder in series. -->
  <g id="layer:base">
    <path d="M20,0 L20,12" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M13,12 L27,12 L27,28 L13,28 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M14,26 L20,14 L20,20 L26,14" stroke="currentColor" stroke-width="1.3" fill="none"/>
    <path d="M20,28 L20,40" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M14,40 L26,40 M16,42 L24,42" stroke="currentColor" stroke-width="1.2" fill="none"/>
  </g>
  <g id="pins">
    <circle data-pin-id="IN" data-pin-kind="power" cx="20" cy="0" r="1"/>
    <circle data-pin-id="OUT" data-pin-kind="power" cx="20" cy="40" r="1"/>
  </g>
</svg>
