<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg">
  <!-- bt_iluminacion: lighting point (signal load) — lamp circle with cross; lit
       glow when energized. Solver derives `lit` from the 2 signal pins. -->
  <g id="layer:energized">
    <path d="M20,10 A10,10 0 1,0 20,30 A10,10 0 1,0 20,10 Z" fill="#f59e0b" opacity="0.35"/>
  </g>
  <g id="layer:base">
    <path d="M20,0 L20,10" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M20,10 A10,10 0 1,0 20,30 A10,10 0 1,0 20,10 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M13,13 L27,27 M27,13 L13,27" stroke="currentColor" stroke-width="1.2" fill="none"/>
    <path d="M20,30 L20,40" stroke="currentColor" stroke-width="1.5" fill="none"/>
  </g>
  <g id="pins">
    <circle data-pin-id="1" data-pin-kind="signal" cx="20" cy="0" r="1"/>
    <circle data-pin-id="2" data-pin-kind="signal" cx="20" cy="40" r="1"/>
  </g>
</svg>
