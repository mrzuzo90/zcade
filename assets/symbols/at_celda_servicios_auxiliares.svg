<svg viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg">
  <!-- at_celda_servicios_auxiliares: HV auxiliary-services cell. PROVISIONAL model
       (spec flags this for Zuzo review): a series fuse on the main line (IN→MID→OUT)
       plus an isolated auxiliary transformer secondary tapping to AUX (right edge). -->
  <g id="layer:base">
    <path d="M2,2 L58,2 L58,58 L2,58 Z" stroke="currentColor" stroke-width="1.3" fill="none"/>
    <path d="M30,0 L30,10" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M24,12 L36,12 L36,26 L24,26 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M30,26 L30,60" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M30,30 L42,30" stroke="currentColor" stroke-width="1.2" fill="none"/>
    <path d="M46,30 A4,4 0 1,0 46,30.01 Z" stroke="currentColor" stroke-width="1.2" fill="none"/>
    <path d="M52,30 A4,4 0 1,0 52,30.01 Z" stroke="currentColor" stroke-width="1.2" fill="none"/>
    <path d="M56,30 L60,30" stroke="currentColor" stroke-width="1.2" fill="none"/>
  </g>
  <g id="pins">
    <circle data-pin-id="IN" data-pin-kind="power" cx="30" cy="0" r="1"/>
    <circle data-pin-id="MID" data-pin-kind="power" cx="30" cy="30" r="1"/>
    <circle data-pin-id="OUT" data-pin-kind="power" cx="30" cy="60" r="1"/>
    <circle data-pin-id="AUX" data-pin-kind="power" cx="60" cy="30" r="1"/>
  </g>
</svg>
