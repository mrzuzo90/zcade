<svg viewBox="0 0 40 30" xmlns="http://www.w3.org/2000/svg">
  <!--
    DC power source. Body outline + "+"/"-" marks, 2 vertical terminal stubs
    down to pins +24V/0V (x=0,40 at y=30, matching library.ts).
  -->
  <g id="layer:base">
    <path d="M0,2 L40,2 L40,20 L0,20 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M10,6 L10,14 M6,10 L14,10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M26,10 L34,10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M0,20 L0,30" stroke="currentColor" stroke-width="1.5"/>
    <path d="M40,20 L40,30" stroke="currentColor" stroke-width="1.5"/>
  </g>
  <g id="pins">
    <circle data-pin-id="+24V" data-pin-kind="power" cx="0" cy="30" r="1"/>
    <circle data-pin-id="0V" data-pin-kind="power" cx="40" cy="30" r="1"/>
  </g>
</svg>
