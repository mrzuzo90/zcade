<svg viewBox="0 0 60 30" xmlns="http://www.w3.org/2000/svg">
  <!--
    Single-phase AC source: L (phase — uses the 'L1' PotentialTag since no
    generic "L" tag exists in the WireType/PotentialTag union), N (neutral),
    PE (protective earth — IEC ground pictogram, decreasing horizontal bars
    over the vertical lead, per CLAUDE.md's Power Source Pins colors).
  -->
  <g id="layer:base">
    <path d="M0,2 L60,2 L60,20 L0,20 Z" stroke="currentColor" stroke-width="1.5" fill="none"/>
    <path d="M5,11 C 8,4 12,18 15,11" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <path d="M0,20 L0,30" stroke="currentColor" stroke-width="1.5"/>
    <path d="M30,20 L30,30" stroke="currentColor" stroke-width="1.5"/>
    <path d="M60,20 L60,30" stroke="currentColor" stroke-width="1.5"/>
    <path d="M52,22 L60,22" stroke="currentColor" stroke-width="1"/>
    <path d="M54,25 L60,25" stroke="currentColor" stroke-width="1"/>
    <path d="M56,28 L60,28" stroke="currentColor" stroke-width="1"/>
  </g>
  <g id="pins">
    <circle data-pin-id="L" data-pin-kind="power" cx="0" cy="30" r="1"/>
    <circle data-pin-id="N" data-pin-kind="power" cx="30" cy="30" r="1"/>
    <circle data-pin-id="PE" data-pin-kind="power" cx="60" cy="30" r="1"/>
  </g>
</svg>
